name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Git tag to release (e.g. v0.1.0-beta)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
          fetch-depth: 0

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress --confirm
          $iscc = Get-ChildItem "${env:ProgramFiles(x86)}\Inno Setup*\ISCC.exe" |
                  Select-Object -First 1 -ExpandProperty FullName
          if (-not $iscc) { throw "ISCC.exe not found after Chocolatey install" }
          $dir = Split-Path $iscc -Parent
          echo "$dir" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Download missing language files
        shell: pwsh
        run: |
          $langDir = "${env:ProgramFiles(x86)}\Inno Setup 6\Languages"
          $missing = @("ChineseSimplified.isl", "ChineseTraditional.isl", "Japanese.isl")
          foreach ($file in $missing) {
            $path = Join-Path $langDir $file
            if (-not (Test-Path $path)) {
              $url = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/$file"
              curl.exe -L -o $path $url 2>$null
              if (-not (Test-Path $path)) { Write-Warning "Failed to download $file" }
            }
          }

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build and pack
        run: python publish.py

      - name: Determine pre-release status
        id: prerelease
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $isPrerelease = $version.Contains('-')
          echo "prerelease=$isPrerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          files: installer/Frisson-Setup-*.exe
          prerelease: ${{ steps.prerelease.outputs.prerelease }}
          generate_release_notes: true
